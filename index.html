<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>みんなのグループチャット</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f0f2f5; overflow: hidden; }

        /* 左サイドバー（メンバー・検索） */
        .sidebar { 
            width: 250px; background: #fff; border-right: 1px solid #ddd; 
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 100;
        }
        .search-box { padding: 10px; border-bottom: 1px solid #ddd; }
        .search-box input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .member-list { flex: 1; overflow-y: auto; padding: 10px; }
        .member { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .status { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px;}
        .status.online { background: #4caf50; }
        .status.offline { background: #ccc; }
        .last-login { font-size: 10px; color: #888; }

        /* メインチャットエリア */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .chat-header { 
            padding: 15px; background: #fff; border-bottom: 1px solid #ddd; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .menu-btn { display: none; font-size: 20px; background: none; border: none; cursor: pointer; margin-right: 10px; }
        .header-title { display: flex; align-items: center; font-weight: bold; }

        /* メッセージ */
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 85%; }
        .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
        .msg-info { font-size: 12px; color: #666; margin-bottom: 4px; }
        .message { background: #fff; padding: 10px 15px; border-radius: 15px; position: relative; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4;}
        .msg-wrap.mine .message { background: #dcf8c6; } 
        .msg-actions { font-size: 11px; color: #888; margin-top: 4px; display: flex; gap: 10px; cursor: pointer; }
        .reaction { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 2px 6px; font-size: 12px; cursor: pointer; margin-top: 5px; }
        .reaction:hover { background: #f0f0f0; }

        /* 入力エリア */
        .input-area { background: #fff; padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 8px; align-items: flex-end; }
        .input-area textarea { flex: 1; resize: none; padding: 10px; border: 1px solid #ccc; border-radius: 20px; height: 40px; max-height: 100px; outline: none; line-height: 1.4;}
        .btn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold;}
        .btn:active { opacity: 0.8; }
        .btn-icon { background: none; color: #555; font-size: 22px; padding: 5px; border:none; cursor: pointer; }

        /* モーダル */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; text-align: center; }
        .modal.hidden { display: none; }
        .modal input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; }
        .google-btn { background: #fff; color: #333; border: 1px solid #ccc; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .google-btn img { width: 18px; }
        .divider { font-size: 12px; color: #888; margin: 10px 0; }

        /* モバイル対応（画面幅768px以下） */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
            .menu-btn { display: block; }
            .msg-wrap { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- ログイン・設定モーダル -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>チャットに参加</h3>
            
            <button class="google-btn" id="googleLoginBtn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G"> Googleでログイン
            </button>
            
            <div class="divider">または ゲストとして参加 (Cookie保存)</div>
            
            <input type="text" id="inputName" placeholder="名前 (必須)">
            <input type="text" id="inputNumber" placeholder="番号 (例: 001)">
            <button class="btn" id="guestJoinBtn">ゲスト参加</button>
        </div>
    </div>

    <!-- 左サイドバー（メンバー一覧） -->
    <div class="sidebar" id="sidebar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="番号か名前で検索...">
        </div>
        <div class="member-list" id="memberList">
            <!-- ここに自動で全ユーザーが表示されます -->
        </div>
    </div>

    <!-- メインチャット -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <div class="header-title">
                <button class="menu-btn" id="menuBtn">≡</button>
                <span>グループチャット</span>
            </div>
            <button class="btn" style="background:#6c757d; font-size: 12px;" onclick="window.logout()">ログアウト</button>
        </div>
        
        <div class="messages" id="chatMessages"></div>

        <div class="input-area">
            <button class="btn-icon" title="画像添付 (準備中)">📎</button>
            <textarea id="messageInput" placeholder="メッセージを入力..."></textarea>
            <button class="btn" id="sendBtn">送信</button>
        </div>
    </div>

    <!-- ==========================================
         Firebase & JavaScript ロジック
    =========================================== -->
    <script type="module">
        // 1. Firebaseの読み込み (Authを追加)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 2. Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyAM8INEj8WkLnOlXvx8swEAPTuX3u2_kt0",
            authDomain: "superchat64-87af5.firebaseapp.com",
            projectId: "superchat64-87af5",
            storageBucket: "superchat64-87af5.firebasestorage.app",
            messagingSenderId: "467180582942",
            appId: "1:467180582942:web:ff1a1f1d729bf247dc160f",
            measurementId: "G-M7W67T3FCM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const msgRef = collection(db, "messages");
        const usersRef = collection(db, "users"); // 全ユーザーリスト用

        // 現在のユーザー情報
        let currentUser = { uid: null, name: "", number: "", isGuest: true };

        // --- Cookie操作 ---
        function getCookie(name) {
            let matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
            return matches ? decodeURIComponent(matches[1]) : undefined;
        }
        function setCookie(name, value) {
            document.cookie = `${name}=${encodeURIComponent(value)}; max-age=2592000; path=/`;
        }

        // --- 認証・ログイン処理 ---
        const settingsModal = document.getElementById('settingsModal');

        // 1. ログイン状態の監視
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Googleログイン済みの場合
                currentUser.uid = user.uid;
                currentUser.name = user.displayName || "Googleユーザー";
                currentUser.number = "G-" + user.uid.substring(0, 4); // 仮の番号
                currentUser.isGuest = false;
                settingsModal.classList.add('hidden');
                await updateUserPresence();
            } else {
                // 未ログインの場合、Cookieを確認
                const cName = getCookie("chatName");
                const cNum = getCookie("chatNumber");
                const cUid = getCookie("chatUid");
                
                if (cName && cNum && cUid) {
                    currentUser.uid = cUid;
                    currentUser.name = cName;
                    currentUser.number = cNum;
                    currentUser.isGuest = true;
                    settingsModal.classList.add('hidden');
                    await updateUserPresence();
                } else {
                    settingsModal.classList.remove('hidden');
                }
            }
        });

        // 2. Googleログインボタン
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("ログインに失敗しました: " + error.message);
            }
        });

        // 3. ゲスト参加ボタン
        document.getElementById('guestJoinBtn').addEventListener('click', async () => {
            const name = document.getElementById('inputName').value.trim();
            const number = document.getElementById('inputNumber').value.trim() || "000";
            if(name) {
                const uid = "guest_" + Date.now(); // ゲスト用の仮ID
                setCookie("chatName", name);
                setCookie("chatNumber", number);
                setCookie("chatUid", uid);
                
                currentUser = { uid, name, number, isGuest: true };
                settingsModal.classList.add('hidden');
                await updateUserPresence();
            } else {
                alert("名前を入力してください");
            }
        });

        // 4. ログアウト
        window.logout = async function() {
            if(!currentUser.isGuest) {
                await signOut(auth);
            }
            // Cookie削除
            document.cookie = "chatName=; max-age=0; path=/";
            document.cookie = "chatNumber=; max-age=0; path=/";
            document.cookie = "chatUid=; max-age=0; path=/";
            location.reload();
        };

        // --- ユーザー状態（オンライン）の記録 ---
        async function updateUserPresence() {
            if(!currentUser.uid) return;
            // usersコレクションに自分の情報を保存/更新
            await setDoc(doc(db, "users", currentUser.uid), {
                name: currentUser.name,
                number: currentUser.number,
                lastSeen: serverTimestamp(),
                isOnline: true
            }, { merge: true });
        }

        // ブラウザを閉じる時にオフラインにする
        window.addEventListener("beforeunload", () => {
            if(currentUser.uid) {
                setDoc(doc(db, "users", currentUser.uid), { isOnline: false, lastSeen: serverTimestamp() }, { merge: true });
            }
        });

        // --- メンバー一覧の取得と表示（検索含む） ---
        const memberList = document.getElementById('memberList');
        const searchInput = document.getElementById('searchInput');
        let allUsers = [];

        onSnapshot(collection(db, "users"), (snapshot) => {
            allUsers = [];
            snapshot.forEach(docSnap => {
                allUsers.push(docSnap.data());
            });
            renderMembers(); // 描画
        });

        function renderMembers() {
            const filterText = searchInput.value.toLowerCase();
            memberList.innerHTML = "";
            
            // 検索フィルター
            const filtered = allUsers.filter(u => 
                (u.name && u.name.toLowerCase().includes(filterText)) || 
                (u.number && u.number.toLowerCase().includes(filterText))
            );

            filtered.forEach(u => {
                const statusClass = u.isOnline ? "online" : "offline";
                const timeText = u.isOnline ? "オンライン" : "オフライン";
                
                memberList.innerHTML += `
                    <div class="member">
                        <div><span class="status ${statusClass}"></span> ${u.name} <span style="color:#888; font-size:12px;">(#${u.number})</span></div>
                        <div class="last-login">${timeText}</div>
                    </div>
                `;
            });
        }
        searchInput.addEventListener('input', renderMembers);


        // --- チャットの送受信処理 ---
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser.uid) return;

            messageInput.value = ""; 
            messageInput.style.height = "40px";

            try {
                await addDoc(msgRef, {
                    uid: currentUser.uid,
                    name: currentUser.name,
                    number: currentUser.number,
                    text: text,
                    createdAt: serverTimestamp(),
                    likes: 0
                });
                updateUserPresence(); // 発言時もオンライン更新
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        messageInput.addEventListener('input', () => {
            messageInput.style.height = "40px";
            messageInput.style.height = (messageInput.scrollHeight) + "px";
        });

        // リアルタイム受信
        const q = query(msgRef, orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatMessages.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const isMine = (data.uid === currentUser.uid); // uidで自分の発言か判定

                const linkedText = data.text ? data.text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>') : "";
                
                const wrap = document.createElement('div');
                wrap.className = `msg-wrap ${isMine ? 'mine' : ''}`;
                wrap.innerHTML = `
                    <div class="msg-info">${data.name} (#${data.number})</div>
                    <div class="message">${linkedText.replace(/\n/g, '<br>')}
                        <button class="reaction" onclick="window.addReaction('${id}', ${data.likes || 0})">👍 <span>${data.likes || 0}</span></button>
                    </div>
                    ${isMine ? `
                    <div class="msg-actions">
                        <span onclick="window.editMessage('${id}', '${data.text.replace(/\n/g, '\\n')}')">編集</span>
                        <span onclick="window.deleteMessage('${id}')">削除</span>
                    </div>` : ''}
                `;
                chatMessages.appendChild(wrap);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // 削除・編集・スタンプ
        window.deleteMessage = async function(id) {
            if(confirm("削除しますか？")) await deleteDoc(doc(db, "messages", id));
        };
        window.editMessage = async function(id, oldText) {
            const newText = prompt("編集", oldText);
            if(newText && newText !== oldText) await updateDoc(doc(db, "messages", id), { text: newText });
        };
        window.addReaction = async function(id, currentLikes) {
            await updateDoc(doc(db, "messages", id), { likes: currentLikes + 1 });
        };

        // --- モバイル用 ハンバーガーメニュー開閉 ---
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');
        const chatArea = document.getElementById('chatArea');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
        // チャット部分を触ったらメニューを閉じる
        chatArea.addEventListener('click', (e) => {
            if(sidebar.classList.contains('open') && e.target !== menuBtn) {
                sidebar.classList.remove('open');
            }
        });

    </script>
</body>
</html>
